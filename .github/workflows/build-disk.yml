---
name: Build disk images

on:
  workflow_dispatch:
    inputs:
      platform:
        required: true
        type: choice
        options:
          - amd64
          - arm64

jobs:
  build:
    name: Build disk images
    runs-on: ${{ inputs.platform == 'amd64' && 'ubuntu-25.10' || 'ubuntu-25.10-arm' }}
    strategy:
      fail-fast: false
      matrix:
        disk-type: ["anaconda-iso"]
    permissions:
      contents: read
      packages: read
      id-token: write

    steps:
      - name: Install dependencies
        run: |
          set -x
          sudo apt update -y
          sudo apt install -y \
            podman jq just
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build disk images
        id: build
        run: |
          just build-iso
      - name: Upload disk images and Checksum to Job Artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          path: output
          if-no-files-found: error
          retention-days: 0
          compression-level: 0
          overwrite: true
      
